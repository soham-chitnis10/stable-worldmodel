defaults:
  - launcher: local
  - solver: cem
  - _self_

world:
  env_name: swm/maze2d_small_diverse
  num_envs: ${eval.num_eval}
  max_episode_steps: ???  # must be >= eval_budget
  history_size: 1
  frame_skip: 1

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio
    - state

seed: 42
policy: random  # checkpoint name or 'random'

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 4  # matches action_repeat=4 used in data generation

eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 100
  img_size: 224
  dataset_name: maze2d_small_diverse
  callables:
    - method: _set_state
      args:
        state:
          value: state
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_state

output:
  filename: maze_results.txt
